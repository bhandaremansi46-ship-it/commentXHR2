<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Task</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container py-5">

    <!-- FORM -->
    <div class="row">
        <div class="col-md-8 mx-auto">

            <div class="card border-0 shadow">

                <!-- CHANGED COLOR -->
                <div class="card-header bg-dark text-white text-center">
                    <h3 class="mb-0">Comment </h3>
                </div>

                <div class="card-body">

                    <form id="commentform">

                        <div class="form-group">
                            <label class="font-weight-bold">Name</label>
                            <input type="text" class="form-control form-control-lg" id="name">
                        </div>

                        <div class="form-group">
                            <label class="font-weight-bold">Email</label>
                            <input type="email" class="form-control form-control-lg" id="email">
                        </div>

                        <div class="form-group">
                            <label class="font-weight-bold">Comment</label>
                            <textarea class="form-control form-control-lg" rows="4" id="body"></textarea>
                        </div>

                        <div class="form-group">
                            <label class="font-weight-bold">User ID</label>
                            <select class="form-control form-control-lg" id="userId">
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>

                        <!-- BUTTON COLORS CHANGED -->
                        <button class="btn btn-success btn-lg btn-block" id="addcomment">
                            Add Comment
                        </button>

                        <button type="button"
                            class="btn btn-warning btn-lg btn-block d-none"
                            id="updatecomment">
                            Update Comment
                        </button>

                    </form>

                </div>
            </div>

        </div>
    </div>

    <!-- SPINNER -->
    <div id="spinner" class="text-center my-5 d-none">
        <div class="spinner-border text-primary"></div>
    </div>

    <!-- CARDS -->
    <div class="row mt-4" id="cardcontainer">
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="./asset/js/app.js"></script>

</body>
</html>
